name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      CGO_ENABLED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.1

      - name: Add Wails to PATH
        run: echo "$env:GOPATH\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Download Go dependencies
        working-directory: oreateai-video-tool/backend
        run: go mod tidy

      - name: Build Windows EXE
        working-directory: oreateai-video-tool/backend
        run: wails build -clean -platform windows/amd64

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: oreateai-studio-windows
          path: oreateai-video-tool/backend/build/bin/oreateai-studio.exe

      - name: Create Release (on tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: oreateai-video-tool/backend/build/bin/oreateai-studio.exe
          generate_release_notes: true