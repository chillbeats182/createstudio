name: Build Windows Desktop

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: bun install

      - name: Remove API routes (not needed for desktop)
        run: Remove-Item -Recurse -Force src\app\api

      - name: Build Next.js frontend
        run: bun run build

      - name: Copy frontend to Wails
        run: |
          if (Test-Path wails-app\frontend) { Remove-Item -Recurse -Force wails-app\frontend }
          New-Item -ItemType Directory -Force -Path wails-app\frontend | Out-Null
          Copy-Item -Path out\* -Destination wails-app\frontend -Recurse

      - name: Download Windows resource compiler
        run: |
          # Wails needs windres for Windows icon compilation
          choco install mingw -y --no-progress

      - name: Resolve Go dependencies
        run: |
          cd wails-app
          go mod tidy
          go mod download

      - name: Build Wails desktop app
        run: |
          cd wails-app
          wails build -platform windows/amd64 -o OreateAI-Studio.exe

      - name: Upload Windows exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: OreateAI-Studio-Windows
          path: wails-app/build/bin/OreateAI-Studio.exe